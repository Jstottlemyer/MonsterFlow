<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MonsterFlow Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262a33;
    --fg: #e6e6e6;
    --muted: #9aa0a6;
    --accent: #4ec9b0;
    --warn: #e5c07b;
    --bad: #e06c75;
    --good: #98c379;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .muted { color: var(--muted); font-size: 12px; }
  #modes { margin-left: auto; display: flex; gap: 4px; }
  #modes button {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-weight: 500;
  }
  #modes button:hover { color: var(--fg); }
  #modes button.active { background: var(--accent); color: #0f1115; border-color: var(--accent); }
  nav { padding: 8px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 4px; flex-wrap: wrap; }
  nav button {
    background: transparent; color: var(--muted); border: 1px solid transparent;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  nav button:hover { color: var(--fg); }
  nav button.active { background: var(--panel); color: var(--fg); border-color: var(--border); }
  main { padding: 24px; display: grid; gap: 16px;
         grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h2 { margin: 0 0 12px 0; font-size: 13px; color: var(--muted); font-weight: 500;
             text-transform: uppercase; letter-spacing: 0.04em; }
  .card canvas { max-width: 100%; }
  .card.wide { grid-column: 1 / -1; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  tbody tr:hover { background: #1d2129; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .badge.green { background: #1e3a2a; color: var(--good); }
  .badge.yellow { background: #3a331a; color: var(--warn); }
  .badge.red { background: #3a1e24; color: var(--bad); }
  .empty { color: var(--muted); font-style: italic; padding: 12px; }
  #error { display: none; background: #3a1e24; color: var(--bad); padding: 12px 24px;
           border-bottom: 1px solid var(--border); }
  /* Persona Insights — scaffolding (rules populated by persona-insights.js renderer). */
  .persona-insights-table { }
  .row-low-sample { opacity: 0.55; }
  .banner-privacy     { border-left: 3px solid var(--warn);   padding: 8px; margin: 8px 0; }
  .banner-stale       { border-left: 3px solid var(--bad);    padding: 8px; margin: 8px 0; }
  .banner-empty-state { border-left: 3px solid var(--accent); padding: 8px; margin: 8px 0; }
  .band-low  { color: var(--warn); }
  .band-mid  { /* default fg */ }
  .band-high { color: var(--good); }
  .badge.silent      { background: #4a5568;       color: #cbd5e0; }
  .badge.never-run   { background: var(--border); color: var(--muted); }
  .badge.deleted     { background: var(--bad);    color: white; }
  .badge.complete-value { /* silent — no rendering */ }
</style>
</head>
<body>
<header>
  <h1>MonsterFlow Dashboard</h1>
  <span class="muted" id="last-updated">loading…</span>
  <div id="modes">
    <button class="active" data-mode="graphify">Graphify</button>
    <button data-mode="judge">Judge</button>
    <button data-mode="personas">Persona Insights</button>
  </div>
</header>
<div id="error"></div>
<nav id="tabs"><button class="active" data-project="__all">All projects</button></nav>
<main id="main"></main>

<!-- Bundled data (regenerated by scripts/dashboard-bundle.sh on every append).
     Using a script tag sidesteps the file:// CORS block that affects fetch().
     Both bundles are optional; missing files surface a friendly empty state. -->
<script src="./data-bundle.js" onerror="window.__GRAPHIFY_BUNDLE_MISSING=true"></script>
<script src="./judge-bundle.js" onerror="window.__JUDGE_BUNDLE_MISSING=true"></script>
<script src="./dashboard.js"></script>
<script src="./judge.js"></script>
<script>
  // Dynamic-roster Slice 4 / Task 15 — augment the Judge "Recent gates · verdict"
  // table with a "Panel Tier Mix" column rendered from each feature's
  // `tier_policy_applied` block (surfaced by scripts/judge-dashboard-bundle.py
  // per Task 16). Defensive: missing/legacy selection.json renders "N/A".
  // Implemented in index.html (not judge.js) per Wave 4a file-ownership split.
  (function () {
    function formatTierMix(tpa) {
      if (!tpa || typeof tpa !== "object") return "N/A";
      if (tpa === "N/A") return "N/A";
      const opus = tpa.opus_count_actual;
      const sonnet = tpa.sonnet_count_actual;
      if (typeof opus !== "number" || typeof sonnet !== "number") return "N/A";
      let label = opus + " Opus / " + sonnet + " Sonnet";
      const codex = tpa.codex;
      if (codex && typeof codex === "object" && codex.policy && codex.policy !== "disabled") {
        label += " + Codex";
      }
      return label;
    }
    function lookupTierMix(project, feature, stage) {
      const bundle = window.__JUDGE_DATA;
      if (!bundle || !bundle.projects) return "N/A";
      const p = bundle.projects[project];
      if (!p || !p.features) return "N/A";
      const f = p.features[feature];
      if (!f) return "N/A";
      // tier_policy_applied lives per-feature (gate-scoped selection.json is
      // resolved at /spec time but the bundle surfaces it at the feature root,
      // with optional per-stage override). Fall back: feature-root → stage blob.
      const stageBlob = (f.stages || {})[stage] || {};
      const tpa = stageBlob.tier_policy_applied
        || f.tier_policy_applied
        || (stageBlob.tier_mix === "N/A" ? "N/A" : null)
        || (f.tier_mix === "N/A" ? "N/A" : null);
      return formatTierMix(tpa);
    }
    function augmentVerdictTable() {
      // Find the "Recent gates · verdict" card. Match by header text so we
      // stay decoupled from class-name churn.
      const cards = document.querySelectorAll("#main .card");
      let target = null;
      for (const c of cards) {
        const h = c.querySelector("h2");
        if (h && h.textContent && h.textContent.indexOf("Recent gates") !== -1) {
          target = c; break;
        }
      }
      if (!target) return;
      const table = target.querySelector("table");
      if (!table || table.dataset.tierMixAugmented === "1") return;
      // Header: insert before the trailing "Open" column.
      const headRow = table.querySelector("thead tr");
      if (headRow) {
        const th = document.createElement("th");
        th.textContent = "Panel Tier Mix";
        // Insert before the last <th> ("Open").
        const lastTh = headRow.lastElementChild;
        if (lastTh) headRow.insertBefore(th, lastTh);
        else headRow.appendChild(th);
      }
      // Body rows: project=td[0], feature=td[1], stage=td[2]. Insert cell
      // before the trailing "Open" td so column alignment stays correct.
      const bodyRows = table.querySelectorAll("tbody tr");
      bodyRows.forEach(function (tr) {
        const tds = tr.children;
        if (tds.length < 4) return;
        const project = (tds[0].textContent || "").trim();
        const feature = (tds[1].textContent || "").trim();
        const stage   = (tds[2].textContent || "").trim();
        const td = document.createElement("td");
        td.textContent = lookupTierMix(project, feature, stage);
        const lastTd = tr.lastElementChild;
        if (lastTd) tr.insertBefore(td, lastTd);
        else tr.appendChild(td);
      });
      table.dataset.tierMixAugmented = "1";
    }
    // Wrap __renderJudgeView so the column appears on every Judge re-render
    // (tab switch, mode toggle). Use a microtask defer so the table exists
    // in DOM before we walk it.
    function installHook() {
      const orig = window.__renderJudgeView;
      if (typeof orig !== "function") return false;
      if (orig.__tierMixHooked) return true;
      const wrapped = function () {
        const r = orig.apply(this, arguments);
        // Defer to next tick: judge.js builds the table synchronously, but
        // future async paths (e.g., chart settles) shouldn't break us.
        Promise.resolve().then(augmentVerdictTable);
        return r;
      };
      wrapped.__tierMixHooked = true;
      window.__renderJudgeView = wrapped;
      return true;
    }
    if (!installHook()) {
      // judge.js may not have evaluated yet under some load orders; retry once
      // after DOMContentLoaded.
      window.addEventListener("DOMContentLoaded", installHook);
    }
  })();
</script>
<!-- Persona Insights bundle (Phase 2 of token-economics). All three are optional —
     a missing file flips __PERSONA_BUNDLES_LOADED=false so persona-insights.js can
     render the empty-state banner gracefully (e.g., adopter on a fresh install). -->
<script src="./data/persona-roster.js"           onerror="window.__PERSONA_BUNDLES_LOADED=false"></script>
<script src="./data/persona-rankings-bundle.js"  onerror="window.__PERSONA_BUNDLES_LOADED=false"></script>
<script src="./persona-insights.js"              onerror="window.__PERSONA_BUNDLES_LOADED=false"></script>
<script>
  // Top-level mode toggle: Graphify (default) | Judge | Persona Insights.
  // Each mode owns its own tabs, charts, and last-updated label.
  const modeButtons = document.querySelectorAll("#modes button");
  function activateMode(mode) {
    modeButtons.forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    if (mode === "judge") {
      if (window.__renderJudgeView) window.__renderJudgeView();
    } else if (mode === "personas") {
      if (window.__renderPersonaInsightsView) {
        window.__renderPersonaInsightsView();
      } else {
        // Stage 2B renderer not yet loaded — placeholder so the tab is testable now.
        const main = document.getElementById("main");
        const tabs = document.getElementById("tabs");
        if (tabs) tabs.innerHTML = "";
        if (main) {
          main.innerHTML = '<div class="card wide"><div class="empty">' +
            'Persona Insights renderer not yet loaded — Wave 2B pending.' +
            '</div></div>';
        }
      }
    } else {
      if (window.__renderGraphifyView) {
        window.__renderGraphifyView();
      } else {
        // Graphify renders on script load by default; nothing to do.
      }
    }
  }
  modeButtons.forEach(b => b.addEventListener("click", () => activateMode(b.dataset.mode)));

  // Surface bundle-missing errors only when the user is in that mode.
  window.addEventListener("DOMContentLoaded", () => {
    if (window.__GRAPHIFY_BUNDLE_MISSING) {
      const e = document.getElementById("error");
      e.style.display = "block";
      e.textContent = "data-bundle.js not found — run: bash ~/Projects/MonsterFlow/scripts/dashboard-bundle.sh";
    }
  });
</script>
</body>
</html>
